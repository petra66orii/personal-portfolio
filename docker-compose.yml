services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: missbott_ollama
    restart: unless-stopped
    profiles:
      - docker-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  llm_gateway:
    build:
      context: ./services/llm-gateway
      dockerfile: Dockerfile
    container_name: missbott_llm_gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      LLM_GATEWAY_LOG_LEVEL: ${LLM_GATEWAY_LOG_LEVEL:-INFO}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY}
      LLM_GATEWAY_REQUIRE_API_KEY: ${LLM_GATEWAY_REQUIRE_API_KEY:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_MODEL_REPORT: ${LLM_MODEL_REPORT:-qwen2.5:14b}
      LLM_MODEL_DRAFT_EMAIL: ${LLM_MODEL_DRAFT_EMAIL:-qwen2.5:14b}
      LLM_MODEL_CHECK_EMAIL: ${LLM_MODEL_CHECK_EMAIL:-qwen2.5:14b}
      PROMPT_VERSION_WEBSITE_REPORTER: ${PROMPT_VERSION_WEBSITE_REPORTER:-2026-03-12}
      PROMPT_VERSION_OUTREACH_WRITER: ${PROMPT_VERSION_OUTREACH_WRITER:-2026-03-12}
      PROMPT_VERSION_EVIDENCE_CHECKER: ${PROMPT_VERSION_EVIDENCE_CHECKER:-2026-03-12}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: missbott_web
    volumes:
      - .:/app
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - static_volume:/var/www/static
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

      # Redis / Celery
      REDIS_URL: redis://redis:6379/0

      # Local LLM (privacy-preserving)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY}
      OLLAMA_AUDIT_MODEL: ${OLLAMA_AUDIT_MODEL:-mistral-nemo:12b}
      OLLAMA_LEAD_MODEL: ${OLLAMA_LEAD_MODEL:-mistral-nemo:12b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
      SERVE_MEDIA_PUBLICLY: ${SERVE_MEDIA_PUBLICLY:-true}

      # External APIs
      GOOGLE_PLACES_KEY: ${GOOGLE_PLACES_KEY}
      GOOGLE_PAGESPEED_KEY: ${GOOGLE_PAGESPEED_KEY}

      # n8n → Django shared secret
      N8N_DJANGO_API_KEY: ${N8N_DJANGO_API_KEY}

    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: missbott_celery_worker
    command: celery -A backend worker -l info
    depends_on:
      - db
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      DJANGO_SECRET_KEY: ${SECRET_KEY}
      DJANGO_DEBUG: ${DEBUG}
      DJANGO_ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

      REDIS_URL: redis://redis:6379/0
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_AUDIT_MODEL: ${OLLAMA_AUDIT_MODEL:-mistral-nemo:12b}
      OLLAMA_LEAD_MODEL: ${OLLAMA_LEAD_MODEL:-mistral-nemo:12b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
      GOOGLE_PAGESPEED_KEY: ${GOOGLE_PAGESPEED_KEY}
      

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: missbott_celery_beat
    command: celery -A backend beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  n8n:
    image: n8nio/n8n:1.122.5
    container_name: missbott_n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    env_file:
      - .env.n8n
    environment:
      N8N_HOST: "localhost"
      N8N_PORT: 5678
      N8N_PROTOCOL: "http"
      GENERIC_TIMEZONE: "Europe/Dublin"
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      - web
      - db

volumes:
  postgres_data:
  media:
  static_volume:
  n8n_data:
  ollama_data:
