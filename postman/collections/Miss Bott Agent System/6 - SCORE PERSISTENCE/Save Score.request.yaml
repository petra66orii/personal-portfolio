$kind: http-request
name: Save Score
method: POST
url: "{{base_django_url}}/api/growth/scores"
order: 1000
headers:
  Content-Type: application/json
  X-N8N-API-KEY: "{{n8n_api_key}}"
body:
  type: json
  content: |-
    {
      "lead_id": {{lead_id}},
      "report_id": {{report_id}}
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("Status is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      const json = pm.response.json();
      if (json.id) {
        pm.collectionVariables.set("score_id", String(json.id));
      }
      pm.test("score_id saved", function () {
        pm.expect(pm.collectionVariables.get("score_id")).to.exist;
      });
    language: text/javascript
