$kind: http-request
name: Evidence - Lighthouse
method: POST
url: "{{base_django_url}}/api/growth/evidence"
order: 1000
headers:
  Content-Type: application/json
  X-N8N-API-KEY: "{{n8n_api_key}}"
body:
  type: json
  content: |-
    {
      "lead_id": {{lead_id}},
      "items": [
        {
          "evidence_type": "lighthouse_json",
          "url": "https://example.com",
          "tool": "lighthouse",
          "payload": {
            "performance_score": 42,
            "lcp_ms": 4200,
            "cls": 0.19
          }
        }
      ]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
    language: text/javascript
