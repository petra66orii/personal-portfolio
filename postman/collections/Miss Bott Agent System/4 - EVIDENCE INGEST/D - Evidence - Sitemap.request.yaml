$kind: http-request
name: Evidence - Sitemap
method: POST
url: "{{base_django_url}}/api/growth/evidence"
order: 4000
headers:
  Content-Type: application/json
  X-N8N-API-KEY: "{{n8n_api_key}}"
body:
  type: json
  content: |-
    {
      "lead_id": {{lead_id}},
      "items": [
        {
          "evidence_type": "sitemap_xml",
          "url": "https://example.com/sitemap.xml",
          "tool": "http_fetch",
          "payload": {
            "exists": false,
            "status_code": 404
          }
        }
      ]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
    language: text/javascript
