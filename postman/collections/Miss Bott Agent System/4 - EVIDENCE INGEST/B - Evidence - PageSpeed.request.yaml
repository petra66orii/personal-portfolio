$kind: http-request
name: Evidence - PageSpeed
method: POST
url: "{{base_django_url}}/api/growth/evidence"
order: 2000
headers:
  Content-Type: application/json
  X-N8N-API-KEY: "{{n8n_api_key}}"
body:
  type: json
  content: |-
    {
      "lead_id": {{lead_id}},
      "items": [
        {
          "evidence_type": "pagespeed_json",
          "url": "https://example.com",
          "tool": "pagespeed",
          "payload": {
            "metrics": {
              "lcp": {
                "value_ms": 4300
              }
            },
            "lighthouseResult": {
              "categories": {
                "performance": {
                  "score": 0.42
                }
              },
              "audits": {
                "largest-contentful-paint": {
                  "numericValue": 4300
                }
              }
            }
          }
        }
      ]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
    language: text/javascript
